name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Build exe
        run: |
          uv pip install pyinstaller
          uv run pyinstaller --onefile --noconsole --name WeakPass --add-data "templates;templates" --add-data "static;static" --hidden-import flask --hidden-import jinja2 --hidden-import werkzeug --hidden-import tkinter app.py

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WeakPass.exe
          generate_release_notes: true
